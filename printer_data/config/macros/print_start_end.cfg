[gcode_macro M106]
rename_existing: M106.1
variable_power_scale: 1.0
gcode:
    {% set s = params.S|default(255)|int %}
    # Scale the incoming S value by the power_scale factor
    {% set scaled_s = (s * power_scale)|int %}
    M106.1 S{scaled_s}

[gcode_macro PRINT_START]
gcode:
  # This part fetches data from your slicer. Such as bed, extruder, and chamber temps and size of your printer.
  {% set target_bed = params.BED|int %}
  {% set target_extruder = params.EXTRUDER|int %}

  {% set mesh_min = params.MESH_MIN|string %}
  {% set mesh_max = params.MESH_MAX|string %}
  {% set probe_count = params.PROBE_COUNT|string %}
  {% set algorythm = params.ALGORYTHM|default("bicubic")|string %}
  {% set adaptive_margin = params.ADAPTIVE_MARGIN|default("5")|int %}
  {% set adaptive = params.ADAPTIVE|default("0")|int %}
    
  # AUTOMATIC FAN LIMIT LOGIC
  {% if target_bed >= 80 %}
      # Scale all fan commands to 50% of their requested power
      SET_GCODE_VARIABLE MACRO=M106 VARIABLE=power_scale VALUE=0.5
      {action_respond_info("High-temp bed: Fan power scaled to 50%%")}
  {% else %}
      # Standard 100% power
      SET_GCODE_VARIABLE MACRO=M106 VARIABLE=power_scale VALUE=1.0
      {action_respond_info("Low-temp bed: Fan power scaled to 100%%")}
  {% endif %}
  
  CLEAR_PAUSE
  STATUS_HOMING                                         # Set LEDs to homing-mode
  BED_MESH_CLEAR
  
  SET_DISPLAY_TEXT MSG="Bed: {target_bed}c"           # Display info on display
  STATUS_HEATING                                      # Set LEDs to heating-mode
  M104 S150                                           # Heat hotend to 150c
  M190 S{target_bed}                                  # Set the target temp for the bed
  M109 S150                                           # Wait for hotend 150c
  
  G28                                                   # Full home (XYZ)
  G90  

  SET_DISPLAY_TEXT MSG="Bed mesh"                       # Display info on display
  STATUS_MESHING                                        # Set LEDs to bed mesh-mode
  #BED_MESH_CALIBRATE MESH_MIN={mesh_min} MESH_MAX={mesh_max} ALGORITHM={algorythm} PROBE_COUNT={probe_count} ADAPTIVE={adaptive} ADAPTIVE_MARGIN={adaptive_margin}
  BED_MESH_CALIBRATE ADAPTIVE=1
  
  SET_DISPLAY_TEXT MSG="Hotend: {target_extruder}c"     # Display info on display
  STATUS_HEATING                                        # Set LEDs to heating-mode
  M107
  # Turn off partcooling fan
  #SMART_PARK                                            # Move to dynamic park position
  G1 X0 Y-15 Z5 F9000
  M109 S{target_extruder}                               # Heat the hotend to set temp

  KOMB
  
  FILAMENT_PROFILE
  
  SET_DISPLAY_TEXT MSG="Printer goes brr"               # Display info on display
  STATUS_PRINTING                                       # Set LEDs to printing-mode
  LINE_PURGE                                            # Adaptive purgeing
  #SQUIGGLY_PURGE PERIODS=5 ADAPTIVE_MODE=0 START_X=0 START_Y=-15

  
[gcode_macro PRINT_END]
#   Use PRINT_END for the slicer ending script - please customize for your slicer of choice
gcode:
    M400                           ; wait for buffer to clear
    G92 E0                         ; zero the extruder
    G1 E-4.0 F3600                 ; retract filament
    G91                            ; relative positioning

#   Get Boundaries
    {% set max_x = printer.configfile.config["stepper_x"]["position_max"]|float %}
    {% set max_y = printer.configfile.config["stepper_y"]["position_max"]|float %}
    {% set max_z = printer.configfile.config["stepper_z"]["position_max"]|float %}

#   Check end position to determine safe direction to move
    {% if printer.toolhead.position.x < (max_x - 20) %}
    {% set x_safe = 20.0 %}
    {% else %}
    {% set x_safe = -20.0 %}
    {% endif %}

    {% if printer.toolhead.position.y < (max_y - 20) %}
    {% set y_safe = 20.0 %}
    {% else %}
    {% set y_safe = -20.0 %}
    {% endif %}

    {% if printer.toolhead.position.z < (max_z - 2) %}
    {% set z_safe = 2.0 %}
    {% else %}
    {% set z_safe = max_z - printer.toolhead.position.z %}
    {% endif %}

    G0 Z{z_safe} F3600             ; move nozzle up
    G0 X{x_safe} Y{y_safe} F20000  ; move nozzle to remove stringing
    TURN_OFF_HEATERS
    M107                           ; turn off fan
    G90                            ; absolute positioning
    G0 X60 Y{max_y} F3600          ; park nozzle at rear
    STATUS_READY


[gcode_macro M600]
gcode:
    G92 E0
    SAVE_GCODE_STATE NAME=COLORCHANGE
    #MMU_CUT_TIP
    RESTORE_GCODE_STATE NAME=COLORCHANGE
    PAUSE


    ######################################################################
# PAUSE PRINT
######################################################################

[gcode_macro PAUSE]
description: Pause the actual running print
rename_existing: BASE_PAUSE
gcode:
    # Parameters
    {% set z = params.Z|default(10)|int %}                                                   ; z hop amount

    {% if printer['pause_resume'].is_paused|int == 0 %}
        M118 {"Pausing Print"}
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=zhop VALUE={z}                              ; set z hop variable for reference in resume macro
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=etemp VALUE={printer['extruder'].target}    ; set hotend temp variable for reference in resume macro

        SAVE_GCODE_STATE NAME=PAUSE                                                          ; save current print position for resume
        BASE_PAUSE                                                                           ; pause print
        {% if (printer.gcode_move.position.z + z) < printer.toolhead.axis_maximum.z %}       ; check that zhop doesn't exceed z max
            G91                                                                              ; relative positioning
            G1 Z{z} F900                                                                     ; raise Z up by z hop amount
        {% else %}
            { action_respond_info("Pause zhop exceeds maximum Z height.") }                  ; if z max is exceeded, show message and set zhop value for resume to 0
            SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=zhop VALUE=0
        {% endif %}
        G90                                                                                  ; absolute positioning
        G1 X-2 Y-20 F15000                                                                  ; park toolhead
        SAVE_GCODE_STATE NAME=PAUSEPARK                                                      ; save parked position in case toolhead is moved during the pause (otherwise the return zhop can error)
        M104 S170                                                                            ; put hotend into sleep
        SET_IDLE_TIMEOUT TIMEOUT=43200                                                       ; set timeout to 12 hours
    {% endif %}
  
######################################################################
# RESUME PRINT
######################################################################  

[gcode_macro RESUME]
description: Resume the actual running print
rename_existing: BASE_RESUME
gcode:
variable_zhop: 0
variable_etemp: 0
gcode:
    # Parameters
    {% set e = params.E|default(25)|int %}                                           ; hotend prime amount (in mm)
    {% if printer['pause_resume'].is_paused|int == 1 %}                                                              ; reset LCD color
        SET_IDLE_TIMEOUT TIMEOUT={printer.configfile.settings.idle_timeout.timeout}  ; set timeout back to configured value
        {% if etemp > 0 %}
            M109 S{etemp|int}                                                        ; wait for hotend to heat back up
        {% endif %}
        {% if printer[printer.toolhead.extruder].temperature >= printer.configfile.settings.extruder.min_extrude_temp %}
            G1 E{e} F900                                                             ; prime nozzle by E
        {% else %}
            G1 E0 F900                                                               ; lower Z back down without priming (just in case we are testing the macro with cold hotend)
        {% endif %}                                                                  ; retract 1mm
        RESTORE_GCODE_STATE NAME=PAUSEPARK MOVE=1 MOVE_SPEED=250                     ; go back to parked position in case toolhead was moved during pause (otherwise the return zhop can error)
        G91                                                                          ; relative positioning
        M83                                                                          ; relative extruder positioning
        RESTORE_GCODE_STATE NAME=PAUSE MOVE=1 MOVE_SPEED=250                         ; restore position
        BASE_RESUME                                                                  ; resume print
    {% endif %}
  