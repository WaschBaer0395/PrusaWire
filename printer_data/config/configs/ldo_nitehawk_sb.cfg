[filament_switch_sensor filament_sensor]
switch_pin: ^nitehawk:gpio10
pause_on_runout: True
event_delay: 2.0
pause_delay: 0.01
runout_gcode:
    M118 Filament Runout Detected
    M600
    CONDITIONAL_BEEP i=3 dur=300 freq=400
insert_gcode:
    M118 Filament Load Detected
    LOAD_FILAMENT

