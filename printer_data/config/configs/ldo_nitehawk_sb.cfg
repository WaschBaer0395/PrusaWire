[thermistor CMFB103F3950FANT]
temperature1: 0.0
resistance1: 32116.0
temperature2: 40.0
resistance2: 5309.0
temperature3: 80.0
resistance3: 1228.0

[temperature_sensor Nitehawk_SB]
sensor_type: CMFB103F3950FANT
sensor_pin: nitehawk:gpio26
pullup_resistor: 2200
min_temp: 0
max_temp: 100
gcode_id: nh_th

[adxl345 fixed]
cs_pin: nitehawk:gpio21
spi_software_sclk_pin: nitehawk:gpio18
spi_software_mosi_pin: nitehawk:gpio20
spi_software_miso_pin: nitehawk:gpio19

[resonance_tester]
probe_points: 125, 110, 20
accel_chip:adxl345 fixed
#accel_chip_y:adxl345 portable

[extruder]
step_pin: nitehawk:gpio23
dir_pin: nitehawk:gpio24
enable_pin: !nitehawk:gpio25
filament_diameter: 1.750
heater_pin: nitehawk:gpio9
max_power: 1
pullup_resistor: 2200
sensor_pin: nitehawk:gpio29
pressure_advance: 0.02
sensor_type: ATC Semitec 104NT-4-R025H42G
nozzle_diameter: 0.4
min_temp: 0
max_temp: 280
microsteps: 32
full_steps_per_rotation: 200
rotation_distance: 22.905740611
gear_ratio: 50:10
min_extrude_temp: 10
max_extrude_only_distance: 150
max_extrude_cross_section: 5
smooth_time: 0.5
#control: pid
#pid_kp: 126.13
#pid_ki: 4.30
#pid_kd: 924.76

#pid_kp = 25
#pid_ki = 1.5
#pid_kd = 90

[tmc2209 extruder]
uart_pin: nitehawk:gpio0
tx_pin: nitehawk:gpio1
run_current: 0.46
sense_resistor: 0.110

#################### FAN START ##################################
####                                                         ####
#################################################################

[heater_fan hotend_fan]
pin: nitehawk:gpio5
tachometer_pin: nitehawk:gpio16
tachometer_ppr: 2

[fan]
pin: !nitehawk:gpio6
# 25kHz is the Intel/PC standard for 4-pin PWM fans
cycle_time: 0.0004 #0.00004
hardware_pwm: True
max_power: 1.0
shutdown_speed: 0.0
tachometer_pin: ^nitehawk:gpio17
tachometer_ppr: 2


[gcode_macro _PCF_CHECK]
description: sub-macro of PREFLIGHT CHECK, not intended to be used outside of parent macro
gcode:
  {% if printer.fan.rpm is not none %}
    {% if printer.fan.rpm > 2500 %}
      {action_respond_info("Part fan self-test: PASS")}
    {% else %}
      CANCEL_PRINT
      {action_respond_info("Part fan self-test: FAIL!")}
    {% endif %}
  {% endif %}

[gcode_macro PREFLIGHT_CHECK]
description: Use before print startup, checks the part fan for failures
gcode:
  M106 S128 ; turn on the part fan
  G4 P2000  ; wait for the fan to spin up
  M400
  _PCF_CHECK ; check part fan speed
  M106 S0   ; turn off the part fan

#################### FAN END ####################################
####                                                         ####
#################################################################


[output_pin act_led]
pin: !nitehawk:gpio8

