[gcode_macro PROBE_DOWN]
gcode:
    SET_PIN PIN=probe_enable VALUE=1

[gcode_macro PROBE_UP]
gcode:
    SET_PIN PIN=probe_enable VALUE=0

[output_pin probe_enable]
pin: nitehawk:gpio13  # Set to the control pin on your board
value: 0

[probe]
pin: !nitehawk:gpio12 
deactivate_on_each_sample: False
x_offset: 38
y_offset: 14
#z_offset: 0
speed: 5
activate_gcode:
    PROBE_DOWN
    G4 P500
deactivate_gcode:
    PROBE_UP
    

[bed_mesh]
speed: 300
horizontal_move_z: 5
mesh_min: 38, 10
mesh_max: 212, 200
probe_count: 7, 7
algorithm: bicubic
fade_start: 1
fade_end: 10
fade_target: 0
mesh_pps: 2, 2

[stepper_z]
endstop_pin: probe:z_virtual_endstop
