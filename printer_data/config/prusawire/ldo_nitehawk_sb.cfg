[thermistor CMFB103F3950FANT]
temperature1: 0.0
resistance1: 32116.0
temperature2: 40.0
resistance2: 5309.0
temperature3: 80.0
resistance3: 1228.0

[temperature_sensor Nitehawk_SB]
sensor_type: CMFB103F3950FANT
sensor_pin: nitehawk:gpio26
pullup_resistor: 2200
min_temp: 0
max_temp: 100
gcode_id: nh_th

[adxl345]
cs_pin: nitehawk:gpio21
spi_software_sclk_pin: nitehawk:gpio18
spi_software_mosi_pin: nitehawk:gpio20
spi_software_miso_pin: nitehawk:gpio19

[resonance_tester]
probe_points: 125, 105, 20
accel_chip: adxl345

[extruder]
step_pin: nitehawk:gpio23
dir_pin: nitehawk:gpio24
enable_pin: !nitehawk:gpio25
filament_diameter: 1.750
heater_pin: nitehawk:gpio9
pullup_resistor: 2200
sensor_pin: nitehawk:gpio29

[tmc2209 extruder]
uart_pin: nitehawk:gpio0
tx_pin: nitehawk:gpio1
run_current: 0.46
sense_resistor: 0.110
#stealthchop_threshold: 7
#driver_TBL: 2
#driver_TOFF: 4
#driver_HSTRT: 3
#driver_HEND: 4
#driver_TPOWERDOWN: 0
#coolstep_threshold: 30
#driver_PWM_GRAD: 4
#driver_PWM_FREQ: 0
#driver_PWM_AUTOSCALE: True
#driver_FREEWHEEL: 1

#################### FAN START ##################################
####                                                         ####
#################################################################

[heater_fan hotend_fan]
pin: nitehawk:gpio5
tachometer_pin: nitehawk:gpio16
tachometer_ppr: 2
tachometer_poll_interval: 0.0015

[fan]
pin: nitehawk:gpio6 #nitehawk:gpio17
cycle_time: 0.00004 # 25 kHz
hardware_pwm: True
max_power: 1.0
shutdown_speed: 0.0
#kick_start_time: 5.0
tachometer_pin: nitehawk:gpio17
tachometer_ppr: 2
tachometer_poll_interval: 0.0015


[gcode_macro _PCF_CHECK]
description: sub-macro of PREFLIGHT CHECK, not intended to be used outside of parent macro
gcode:
  {% if printer.fan.rpm is not none %}
    {% if printer.fan.rpm > 2500 %}
      {action_respond_info("Part fan self-test: PASS")}
    {% else %}
      CANCEL_PRINT
      {action_respond_info("Part fan self-test: FAIL!")}
    {% endif %}
  {% endif %}

[gcode_macro PREFLIGHT_CHECK]
description: Use before print startup, checks the part fan for failures
gcode:
  M106 S128 ; turn on the part fan
  G4 P2000  ; wait for the fan to spin up
  M400
  _PCF_CHECK ; check part fan speed
  M106 S0   ; turn off the part fan

#################### FAN END ####################################
####                                                         ####
#################################################################


[output_pin act_led]
pin: !nitehawk:gpio8

[temperature_sensor pinda_v2]
sensor_type: Generic 3950
#   One of "EPCOS 100K B57560G104F", "ATC Semitec 104GT-2",
#   "ATC Semitec 104NT-4-R025H42G", "Generic 3950",
#   "Honeywell 100K 135-104LAG-J01", "NTC 100K MGB18-104F39050L32",
#   "SliceEngineering 450", or "TDK NTCG104LH104JT1"
sensor_pin: nitehawk:gpio28
min_temp: -10
max_temp: 150
gcode_id:

[filament_switch_sensor filament_sensor]
switch_pin: ^nitehawk:gpio3
pause_on_runout: True
event_delay: 3.0
pause_delay: 0.01
runout_gcode:
    M118 Filament Runout Detected
    M600
    CONDITIONAL_BEEP i=3 dur=300 freq=400
insert_gcode:
    M118 Filament Load Detected
    LOAD_FILAMENT

[delayed_gcode _DISABLE_FILAMENT_SENSOR]
initial_duration: 1
gcode:
    SET_FILAMENT_SENSOR SENSOR=filament_sensor ENABLE=0

[gcode_macro M600]
description: Color change
gcode:
    {% set X = params.X|default(0)|float %}
    {% set Y = params.Y|default(0)|float %}
    {% set Z = params.Z|default(10)|float %}
    SAVE_GCODE_STATE NAME=M600_state
    PAUSE
    G91
    G1 E-.8 F2700
    G1 Z{Z}
    G90
    G1 X{X} Y{Y} F3000
    G91
    G1 E-50 F1000
    RESTORE_GCODE_STATE NAME=M600_state

[gcode_macro UNLOAD_FILAMENT]
description: Unloads filament from toolhead
gcode:
    {% set EXTRUDER_TEMP = params.TEMP|default(230)|int %}
    CHOME
    G91                         ; relative positioning
    G1 Z20                      ; move nozzle upwards
    FRONT                       ; move the toolhead to the front
    LOGO_PENDING
    M109 S{EXTRUDER_TEMP}       ; heat up the hotend
    LOGO_READY
    M83                         ; set extruder to relative mode
    G1 E-8 F1800                ; quickly retract a small amount to elimate stringing
    G4 P200                     ; pause for a short amount of time
    G1 E-50 F300                ; retract slowly the rest of the way
    G1 E-20 F300
    M400                        ; wait for moves to finish
    M117 Unload Complete!
    LOGO_OFF

[gcode_macro LOAD_FILAMENT]
description: Loads new filament into toolhead
gcode:
    {% set EXTRUDER_TEMP = params.TEMP|default(230)|int %}
    FRONT                       ; move the toolhead to the front
    LOGO_PENDING
    M109 S{EXTRUDER_TEMP}       ; heat up the hotend
    LOGO_READY
    M83                         ; set extruder to relative mode
    G1 E50 F300                 ; extrude slowlyL
    G1 E50 F300
    M400                        ; wait for moves to finish
    M117 Load Complete!
    LOGO_OFF